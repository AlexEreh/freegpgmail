pre-commit:
  parallel: true
  commands:
    swiftlint:
      glob: "*.swift"
      run: |
        if command -v swiftlint >/dev/null 2>&1; then
          swiftlint lint --config .swiftlint.yml --quiet {staged_files}
        else
          echo "swiftlint not installed, skipping (brew install swiftlint)"
        fi

    trailing-whitespace:
      run: |
        if git diff --cached --check 2>/dev/null; then
          true
        else
          echo "Warning: trailing whitespace found"
        fi

    no-secrets:
      run: |
        if git diff --cached --name-only | grep -qE '\.(env|key|pem|p12|mobileprovision)$'; then
          echo "ERROR: Potential secret file staged for commit"
          exit 1
        fi

pre-push:
  commands:
    build-check:
      run: make build
      skip:
        - merge
        - rebase
