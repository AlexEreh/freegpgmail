name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  build:
    name: Build Release
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make generate

      - name: Build Release
        run: |
          xcodebuild -project FreeGPGMail.xcodeproj \
            -scheme FreeGPGMail \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/FreeGPGMail.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "FreeGPGMail" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "FreeGPGMail-${{ github.ref_name }}.dmg"

      - name: Create ZIP
        run: |
          cd build/Build/Products/Release
          zip -r "../../../../FreeGPGMail-${{ github.ref_name }}.zip" FreeGPGMail.app

      - name: Generate SLSA subject hashes
        id: hash
        run: |
          set -euo pipefail
          HASHES=$(sha256sum FreeGPGMail-*.dmg FreeGPGMail-*.zip | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            FreeGPGMail-*.dmg
            FreeGPGMail-*.zip
          retention-days: 5

  provenance:
    name: SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  release:
    name: Create GitHub Release
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FreeGPGMail-*.dmg
            FreeGPGMail-*.zip
