name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  build:
    name: Build Release
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make generate

      - name: Build Release
        run: |
          xcodebuild -project FreeGPGMail.xcodeproj \
            -scheme FreeGPGMail \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/FreeGPGMail.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "FreeGPGMail" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "FreeGPGMail-${{ github.ref_name }}.dmg"

      - name: Create ZIP
        run: |
          cd build/Build/Products/Release
          zip -r "../../../../FreeGPGMail-${{ github.ref_name }}.zip" FreeGPGMail.app

      # SLSA L3: генерируем SHA-256 хеши артефактов для provenance attestation
      # shasum (macOS) вместо sha256sum (Linux), base64 без -w0 (macOS)
      - name: Generate SLSA subject hashes
        id: hash
        run: |
          set -euo pipefail
          # shasum -a 256 выдаёт формат "hash  filename" — совместим с sha256sum
          # base64 | tr -d '\n' — убираем возможные переносы строк (macOS base64 wraps at 76 chars)
          HASHES=$(shasum -a 256 FreeGPGMail-*.dmg FreeGPGMail-*.zip | base64 | tr -d '\n')
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            FreeGPGMail-*.dmg
            FreeGPGMail-*.zip
          retention-days: 5

  # SLSA L3: provenance генерируется ИЗОЛИРОВАННЫМ reusable workflow от slsa-framework
  # Этот workflow запускается в ОТДЕЛЬНОМ runner'е, к которому у нас НЕТ доступа.
  # Он подписывает provenance через Sigstore (OIDC token от GitHub),
  # что делает подделку provenance невозможной — даже для владельца репозитория.
  #
  # Что это доказывает (SLSA L3):
  #   1. Build-as-code: определение сборки в VCS (этот workflow)
  #   2. Ephemeral isolated: GitHub-hosted runner, одноразовый
  #   3. Non-falsifiable provenance: генерируется trusted builder'ом (slsa-github-generator),
  #      подписывается через Sigstore OIDC, владелец репо НЕ МОЖЕТ подменить
  #
  # Верификация: slsa-verifier verify-artifact FreeGPGMail-v*.dmg \
  #   --provenance-path multiple.intoto.jsonl \
  #   --source-uri github.com/alexereh/freegpgmail
  provenance:
    name: SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  release:
    name: Create GitHub Release
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            FreeGPGMail-*.dmg
            FreeGPGMail-*.zip
